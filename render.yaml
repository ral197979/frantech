services:
  - type: web
    name: frantech-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: frantech
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: frantech-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  - type: web
    name: frantech-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l 5173
    routes:
      - path: /
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: frantech-backend
          property: url

  - type: pserv
    name: frantech
    ipAllowList: []

  - type: redis
    name: frantech-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: frantech
    databaseName: frantech
    user: frantech
    plan: free
