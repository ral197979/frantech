services:
  - type: web
    name: frantech-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: frantech
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
    plan: free

  - type: web
    name: frantech-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npx serve -s dist -l 5173
    envVars:
      - key: VITE_API_URL
        value: https://frantech-backend.onrender.com
    plan: free

  - type: redis
    name: frantech-redis
    ipAllowList: []
    plan: free

databases:
  - name: frantech
    databaseName: frantech
    user: frantech
    plan: free
